<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PROJAE</title>
    <link rel="shortcut icon" href="img/isotipo.png" type="image/x-icon">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="principal">
        <img class="logo-img" src="img/imagotipo.png" alt="LOGO PROJAE">
        <div class="container">
            <h1 class="titulo">Entrar</h1>
            <form method="POST" class="form">
                <label class="input-label" for="email">
                    E-mail
                    <input class="input" placeholder="Digite seu Email" id="email" type="email" required>
                </label>
                <!-- onde ficará a mensagem de erro da email (span) -->
                <label class="input-label" for="senha">
                    Sua Senha
                    <input class="input" placeholder="Digite sua senha" id="senha" type="password" required>
                </label>
                <!-- onde ficará a mensagem de erro da senha (span) -->

                <h2 class="subtitulo">Escolha seu tipo de conta:</h2>

                <div class="tipoConta">
                    <label class="btn-pessoa" for="pessoa">
                        <input type="radio" id="pessoa" name="opcao" value="1" required>
                        Pessoa
                    </label>
                    <label class="btn-empresa" for="empresa">
                        <input type="radio" id="empresa" name="opcao" value="2" required>
                        Empresa
                    </label>
                </div>

                <button class="btn-submit" type="submit">Entrar</button>
            </form>
            <!-- caso possivel aqui seria o redefinir senha -->
            <a href="cadastro.php" class="link">Criar uma conta!</a>
        </div>
    </main>
    <script src="js/login.js"></script>
</body>
</html>
